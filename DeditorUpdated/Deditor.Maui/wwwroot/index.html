<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DEditor</title>
    <base href="/" />

    <!-- Syncfusion styles (from Shared.UI RCL) -->
    <link href="_content/Deditor.Shared.UI/css/material.css" rel="stylesheet" />
    <!-- Syncfusion Blazor components (DropDowns/Inputs/Buttons used by iPubEdit modal) -->
    <link href="_content/Syncfusion.Blazor.Themes/material3.css" rel="stylesheet" />

    <!-- App styles (from Shared.UI RCL) -->
    <link href="_content/Deditor.Shared.UI/css/app.css?v=4" rel="stylesheet" />
    <link href="_content/Deditor.Shared.UI/css/fontdialog.css" rel="stylesheet" />
    <link href="_content/Deditor.Shared.UI/css/selectiontoolbar.css" rel="stylesheet" />
    <link href="_content/Deditor.Shared.UI/css/Navigation.css" rel="stylesheet" />
    <link href="_content/Deditor.Shared.UI/css/Ribbontabs.css?v=4" rel="stylesheet" />
    <link rel="icon" href="data:," />
    <link href="_content/Deditor.Shared.UI/css/schemacontrols.css" rel="stylesheet" />
    <link href="_content/Deditor.Shared.UI/css/cctagpicker.css" rel="stylesheet" />
</head>
<body>
    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#x1f5d9;</a>
    </div>

    <div id="globalLoader" style="
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:9999;
">
    <div>
        <div class="global-spinner"></div>
        <div id="loaderText" style="
            font-size:14px;font-weight:600;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;
            margin-top:16px;text-align:center;
        "></div>
    </div>
</div>

<style>
    .global-spinner {
        width: 36px;
        height: 36px;
        margin: 0 auto;
        border: 3px solid #E8E5E0;
        border-top-color: #2383E2;
        border-radius: 50%;
        animation: spinRotate .8s linear infinite;
    }
    @keyframes spinRotate {
        to { transform: rotate(360deg); }
    }
</style>
</div>

    <!-- Syncfusion EJ2 Document Editor bundle (from Shared.UI RCL) -->
    <script src="_content/Deditor.Shared.UI/js/ej2.min.js"></script>

    <!-- compromise.js — free open-source NLP for Essential Caps -->
    <script src="_content/Deditor.Shared.UI/js/compromise.js"></script>

    <!-- Custom JS (from Shared.UI RCL) -->
    <script src="_content/Deditor.Shared.UI/js/cetemplates.js?v=1"></script>
    <script src="_content/Deditor.Shared.UI/js/documenteditor.js?v=35"></script>
    <script src="_content/Deditor.Shared.UI/js/selectiontoolbar.js"></script>
    <script src="_content/Deditor.Shared.UI/js/schemaparser.js"></script>
    <script src="_content/Deditor.Shared.UI/js/cctagpicker.js"></script>

    <!-- Search input keyboard handling -->
    <script>
        document.addEventListener('keydown', function (e) {
            if (!document.activeElement || document.activeElement.id !== 'searchInput') return;
            e.stopPropagation();
            if (e.key === 'Enter') {
                e.preventDefault();
                navigateSearch(e.shiftKey ? 'prev' : 'next');
            }
        }, true);

        document.addEventListener('keypress', function (e) {
            if (document.activeElement && document.activeElement.id === 'searchInput')
                e.stopPropagation();
        }, true);

        document.addEventListener('keyup', function (e) {
            if (document.activeElement && document.activeElement.id === 'searchInput')
                e.stopPropagation();
        }, true);

        function navigateSearch(direction) {
            if (!window._deContainer) return;
            var results = window._deContainer.documentEditor.search.searchResults;
            if (!results || results.length === 0) return;
            if (direction === 'next') {
                results.index = (results.index + 1) % results.length;
            } else {
                results.index = (results.index - 1 + results.length) % results.length;
            }
            setTimeout(function () {
                var el = document.getElementById('searchInput');
                if (el) { el.focus(); var l = el.value.length; el.setSelectionRange(l, l); }
            }, 30);
        }
    </script>

    <!-- Syncfusion Blazor JS bundle — defines window.sfBlazor used by SfDropDownList / SfTextBox / SfCheckBox.
         Loaded explicitly (script isolation is disabled in MauiProgram.cs) so it is ready before first render. -->
    <script src="_content/Syncfusion.Blazor.Core/scripts/syncfusion-blazor.min.js"></script>

    <!-- Blazor MAUI WebView runtime -->
    <script src="_framework/blazor.webview.js"></script>
</body>
</html>
